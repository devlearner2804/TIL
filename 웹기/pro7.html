<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1104김민성</title>
    <style>
        header {
            text-align: center;
        }

        footer {
            text-align: center;
        }

        span {
            background: slateblue;
        }
    </style>
</head>

<body>
    <header><span><b>회원 가입 화면</b></span></header>
    <section>
        <article>
            <form action="" class="info">
                <fieldset>
                    <legend>기본 정보</legend>
                    아이디:<input type="text"><br>
                    패스워드:<input type="password"><br>
                    애름: <input type="text" maxlength="10"><br>
                    생일:<input type="date"><br>
                    이메일주소:<input type="email" placeholder="id@host"><br>
                    주소 :
                    <select>
                        <option value="1">서울특별시</option>
                        <option value="2>광주광역시</option>
                    <option value=" 3">대구광역시</option>
                    </select>
                    </fieldset>
            </form>
            <form action="" class="hobby">
                <fieldset>
                    <legend>취미</legend>
                    <label>
                        <input type="radio" name="like" value="1">
                        게임<img src="7장게임.jpg" height="200px"><label>
                        </label>
                        <label>
                            <input type="radio" name="like" value="2">
                            골프<img src="7장골프.png" height="200px"></label>
                    </label>
                    <label>
                        <input type="radio" name="like" value="3">
                        하이킹<img src="7장하이킹.jpg" height="200px">
                    </label>
                </fieldset>
                <input type="submit" value="가입">
                <input type="submit" value="탈퇴">
            </form>
        </article>
    </section>
    <footer><span>&copy;gsm highschool 2025 sep</span></footer>
</body>

</html>
